services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dropai
      POSTGRES_PASSWORD: dropai
      POSTGRES_DB: dropai
    ports:
      - "5433:5432"
    volumes:
      - dropai_pg:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

volumes:
  dropai_pg:
